name: Publish Market To External Pages Repo

on:
  workflow_dispatch:
    inputs:
      market:
        description: Market to build
        required: true
        default: ro
        type: choice
        options:
          - uk
          - ro
      target_repo:
        description: owner/repo of the Pages deployment repository
        required: true
        default: exente-tech/elevoncontrols-ro
      target_branch:
        description: Branch used by the target repository for Pages content
        required: true
        default: main

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Select target market
        run: npm run select:${{ inputs.market }}

      - name: Build selected market
        run: npm run build

      - name: Finalize Pages output
        run: npm run finalize:${{ inputs.market }}

      - name: Publish to external Pages repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          external_repository: ${{ inputs.target_repo }}
          publish_branch: ${{ inputs.target_branch }}
          publish_dir: ./dist
          force_orphan: true
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
